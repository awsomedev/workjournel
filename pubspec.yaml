name: workjournel
description: "Ai Work Journal"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: 1.0.8
  go_router: 17.1.0
  window_manager: 0.5.1
  flutter_gemma: 0.12.6
  path_provider: ^2.1.5
  shared_preferences: 2.5.5
  hive: 2.2.3
  hive_flutter: 1.1.0
  background_downloader: 9.5.4
  pdf: 3.12.0
  flutter_markdown_plus: 1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: 0.14.4


flutter_launcher_icons:
  image_path: "assets/icon.png"
  macos:
    generate: true
  ios:
    generate: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-ExtraBold.ttf
          weight: 800
    - family: Lexend
      fonts:
        - asset: assets/fonts/lexend/Lexend-Regular.ttf
          weight: 400
        - asset: assets/fonts/lexend/Lexend-Medium.ttf
          weight: 500
        - asset: assets/fonts/lexend/Lexend-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/lexend/Lexend-Bold.ttf
          weight: 700
